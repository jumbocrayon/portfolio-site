<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jess Loeb — Living Testbed</title>
    <meta
      name="description"
      content="A personal portfolio that's more than a résumé — a living testbed where I run interactive-media experiments in public."
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Set theme before paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          // A saved choice wins; otherwise respect the OS, defaulting to dark
          // when no preference is expressed.
          var saved = localStorage.getItem("theme");
          var theme =
            saved ||
            (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
